<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f7f9" />
    <title>Alcheme Subproject Architecture Maps</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --ink: #17202a;
        --muted: #5f6b7a;
        --line: #d6dce3;
        --accent: #2f6fed;
        --accent-soft: #e7efff;
        --contract: #0f766e;
        --projection: #7c3aed;
        --runtime: #b45309;
        --client: #2563eb;
        --extension: #be123c;
        --ops: #475569;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      a {
        color: inherit;
      }

      .shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .skip-link {
        position: absolute;
        left: 16px;
        top: 16px;
        z-index: 10;
        transform: translateY(-140%);
        border: 1px solid var(--accent);
        border-radius: 8px;
        background: var(--surface);
        color: var(--accent);
        padding: 8px 12px;
        text-decoration: none;
      }

      .skip-link:focus-visible {
        transform: translateY(0);
      }

      header {
        display: grid;
        gap: 12px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: 3.5rem;
        letter-spacing: 0;
        line-height: 1.05;
        text-wrap: balance;
      }

      .lede {
        max-width: 820px;
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .top-links,
      .filters,
      .map-nav,
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .top-links a,
      .links a,
      .map-nav a {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        padding: 6px 10px;
        text-decoration: none;
        font-size: 0.9rem;
        touch-action: manipulation;
      }

      .toolbar {
        display: grid;
        gap: 12px;
        margin: 24px 0 12px;
      }

      .search {
        width: min(100%, 420px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font: inherit;
        padding: 10px 12px;
      }

      .filter {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        padding: 8px 12px;
        touch-action: manipulation;
      }

      .filter:hover,
      .top-links a:hover,
      .links a:hover,
      .map-nav a:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .filter:focus-visible,
      .search:focus-visible,
      .top-links a:focus-visible,
      .links a:focus-visible,
      .map-nav a:focus-visible,
      .skip-link:focus-visible {
        outline: 3px solid rgba(47, 111, 237, 0.35);
        outline-offset: 2px;
      }

      .filter[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: #143d8f;
      }

      .status {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .maps {
        display: grid;
        gap: 18px;
        margin-top: 18px;
      }

      .project {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 16px;
      }

      .project header {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
      }

      .project h2 {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: 0;
      }

      .project p {
        margin: 0;
        color: var(--muted);
        font-size: 0.94rem;
      }

      .project:target {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.12);
      }

      .diagram {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfe;
        padding: 10px;
      }

      svg {
        display: block;
        min-width: 760px;
      }

      .edge {
        fill: none;
        stroke: #9aa6b2;
        stroke-width: 1.5;
        marker-end: url(#arrow);
      }

      .node rect {
        fill: #ffffff;
        stroke: var(--line);
        stroke-width: 1.5;
        rx: 8;
      }

      .node[data-kind="contract"] rect {
        stroke: var(--contract);
      }

      .node[data-kind="projection"] rect {
        stroke: var(--projection);
      }

      .node[data-kind="runtime"] rect {
        stroke: var(--runtime);
      }

      .node[data-kind="client"] rect {
        stroke: var(--client);
      }

      .node[data-kind="extension"] rect {
        stroke: var(--extension);
      }

      .node[data-kind="ops"] rect {
        stroke: var(--ops);
      }

      .node text {
        fill: var(--ink);
        font-size: 13px;
      }

      .node .small {
        fill: var(--muted);
        font-size: 11px;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--muted);
        padding: 18px;
      }

      @media (max-width: 680px) {
        .shell {
          padding: 24px 12px 36px;
        }

        h1 {
          font-size: 2.35rem;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#maps">Skip to subproject maps</a>
    <main class="shell">
      <header>
        <h1>Alcheme Subproject Architecture Maps</h1>
        <p class="lede">
          A no-build atlas of per-subproject diagrams. Each section maps one
          README-backed package, program, service, extension, client, or local
          runtime surface.
        </p>
        <nav class="top-links" aria-label="Architecture guide links">
          <a href="./alcheme-architecture-map.html">Global HTML map</a>
          <a href="./README.md">Architecture README</a>
          <a href="./architecture-inventory.md">Source inventory</a>
        </nav>
      </header>

      <section class="toolbar" aria-label="Subproject map controls">
        <input id="search" class="search" type="search" placeholder="Search subprojects" aria-label="Search subprojects" />
        <nav class="filters" aria-label="Filter subproject layers">
          <button class="filter" type="button" data-filter="all" aria-pressed="true">All</button>
          <button class="filter" type="button" data-filter="contract" aria-pressed="false">Contract</button>
          <button class="filter" type="button" data-filter="projection" aria-pressed="false">Projection</button>
          <button class="filter" type="button" data-filter="runtime" aria-pressed="false">Runtime/API</button>
          <button class="filter" type="button" data-filter="client" aria-pressed="false">Client</button>
          <button class="filter" type="button" data-filter="extension" aria-pressed="false">Extension</button>
          <button class="filter" type="button" data-filter="ops" aria-pressed="false">Ops</button>
        </nav>
      </section>
      <p id="status" class="status" aria-live="polite"></p>
      <nav id="map-nav" class="map-nav" aria-label="Subproject quick links"></nav>
      <section id="maps" class="maps" aria-label="Subproject architecture maps"></section>
    </main>

            ["adapter", "Host adapters", "chat + voice methods", 2, 1, "client"],
            ["client", "SDK or custom client", "runtime implementation", 3, 1, "client"],
            ["query", "query-api", "rooms, messages, voice", 4, 1, "runtime"],
          ],
          edges: [["app", "ui"], ["ui", "adapter"], ["adapter", "client"], ["client", "query"]],
        },
        {
          id: "game-chat-headless",
          title: "examples/game-chat-headless",
          layer: "client",
          readme: "../../examples/game-chat-headless/README.md",
          summary: "Headless example that integrates an external app runtime with Alcheme communication runtime.",
          nodes: [
            ["game", "External runtime", "headless integration", 0, 1, "client"],
            ["example", "Headless example", "runtime wiring", 1, 1, "client"],
            ["sdk", "@alcheme/sdk", "room and message clients", 2, 0, "client"],
            ["api", "query-api", "communication runtime", 3, 0, "runtime"],
            ["programs", "Messaging programs", "chain anchors when needed", 3, 2, "contract"],
          ],
          edges: [["game", "example"], ["example", "sdk"], ["sdk", "api"], ["sdk", "programs"]],
        },
        {
          id: "local-stack",
          title: "local stack",
          layer: "ops",
          readme: "../../scripts/start-local-stack.sh",
          summary: "Developer-only orchestration that boots chain, storage, services, extensions, and frontend together.",
          nodes: [
            ["script", "start-local-stack.sh", "orchestration entry", 0, 1, "ops"],
            ["chain", "Local Solana RPC", "program deployment", 1, 0, "contract"],
            ["storage", "Postgres + Redis", "read and runtime state", 1, 2, "runtime"],
            ["services", "query-api + indexer", "runtime and projection", 2, 1, "runtime"],
            ["extensions", "tracker + signer", "sidecar processes", 3, 0, "extension"],
            ["frontend", "frontend", "local product UI", 3, 2, "client"],
          ],
          edges: [["script", "chain"], ["script", "storage"], ["chain", "services"], ["storage", "services"], ["services", "extensions"], ["services", "frontend"]],
        },
      ];

      const buttons = Array.from(document.querySelectorAll(".filter"));
      const search = document.querySelector("#search");
      const status = document.querySelector("#status");
      const nav = document.querySelector("#map-nav");
      const mapsRoot = document.querySelector("#maps");
      const nodeWidth = 168;
      const nodeHeight = 58;
      const xGap = 190;
      const yGap = 92;
      const marginX = 34;
      const marginY = 42;

      function normalizeFilter(raw) {
        const value = String(raw || "all").replace(/^#layer-/, "");
        return layerLabels.has(value) ? value : "all";
      }

      function filterFromHash() {
        return location.hash.startsWith("#layer-") ? normalizeFilter(location.hash) : "all";
      }

      function scrollToProjectFromHash() {
        const id = location.hash.replace(/^#/, "");
        if (!maps.some((project) => project.id === id)) {
          return;
        }
        requestAnimationFrame(() => {
          document.getElementById(id)?.scrollIntoView({ block: "start" });
        });
      }

      function wrapText(value, maxLength) {
        const words = String(value).split(" ");
        const lines = [];
        let line = "";
        for (const word of words) {
          const next = line ? `${line} ${word}` : word;
          if (next.length > maxLength && line) {
            lines.push(line);
            line = word;
          } else {
            line = next;
          }
        }
        if (line) {
          lines.push(line);
        }
        return lines.slice(0, 2);
      }

      function createSvgElement(name, attrs = {}) {
        const element = document.createElementNS("http://www.w3.org/2000/svg", name);
        for (const [key, value] of Object.entries(attrs)) {
          element.setAttribute(key, value);
        }
        return element;
      }

      function renderDiagram(project) {
        const maxCol = Math.max(...project.nodes.map((node) => node[3]));
        const maxRow = Math.max(...project.nodes.map((node) => node[4]));
        const width = marginX * 2 + maxCol * xGap + nodeWidth;
        const height = marginY * 2 + maxRow * yGap + nodeHeight;
        const svg = createSvgElement("svg", {
          viewBox: `0 0 ${width} ${height}`,
          width,
          height,
          role: "img",
          "aria-label": `${project.title} architecture diagram`,
        });

        const defs = createSvgElement("defs");
        const marker = createSvgElement("marker", {
          id: `arrow-${project.id}`,
          markerWidth: "10",
          markerHeight: "10",
          refX: "8",
          refY: "3",
          orient: "auto",
        });
        marker.appendChild(createSvgElement("path", { d: "M0,0 L0,6 L8,3 z", fill: "#9aa6b2" }));
        defs.appendChild(marker);
        svg.appendChild(defs);

        const positions = new Map();
        for (const [id, label, detail, col, row, kind] of project.nodes) {
          const x = marginX + col * xGap;
          const y = marginY + row * yGap;
          positions.set(id, { x, y });
          const group = createSvgElement("g", { class: "node", "data-kind": kind || project.layer });
          group.appendChild(createSvgElement("rect", { x, y, width: nodeWidth, height: nodeHeight }));
          wrapText(label, 20).forEach((line, index) => {
            const text = createSvgElement("text", { x: x + 14, y: y + 22 + index * 15 });
            text.textContent = line;
            group.appendChild(text);
          });
          const small = createSvgElement("text", { class: "small", x: x + 14, y: y + 48 });
          small.textContent = detail;
          group.appendChild(small);
          svg.appendChild(group);
        }

        for (const [from, to] of project.edges) {
          const start = positions.get(from);
          const end = positions.get(to);
          if (!start || !end) {
            continue;
          }
          const x1 = start.x + nodeWidth;
          const y1 = start.y + nodeHeight / 2;
          const x2 = end.x;
          const y2 = end.y + nodeHeight / 2;
          const mid = x1 + Math.max(36, (x2 - x1) / 2);
          const d = x2 >= x1
            ? `M${x1} ${y1} C${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`
            : `M${start.x + nodeWidth / 2} ${start.y + nodeHeight} V${end.y - 12} H${end.x + nodeWidth / 2} V${end.y}`;
          svg.insertBefore(createSvgElement("path", {
            class: "edge",
            d,
            "marker-end": `url(#arrow-${project.id})`,
          }), svg.children[1] || null);
        }

        return svg;
      }

      function projectMatches(project, filter, query) {
        const haystack = `${project.title} ${project.layer} ${project.summary}`.toLowerCase();
        return (filter === "all" || project.layer === filter) && haystack.includes(query);
      }

      function updateUrl(filter, query) {
        const nextUrl = new URL(location.href);
        nextUrl.searchParams.delete("q");
        if (query) {
          nextUrl.searchParams.set("q", query);
        }
        nextUrl.hash = filter === "all" ? "" : `layer-${filter}`;
        history.replaceState(null, "", nextUrl);
      }

      function render(options = {}) {
        const filter = normalizeFilter(options.filter || filterFromHash());
        const query = String(search.value || "").trim().toLowerCase();
        for (const button of buttons) {
          button.setAttribute("aria-pressed", String(button.dataset.filter === filter));
        }
        const visible = maps.filter((project) => projectMatches(project, filter, query));
        nav.replaceChildren();
        mapsRoot.replaceChildren();
        for (const project of visible) {
          const quick = document.createElement("a");
          quick.href = `#${project.id}`;
          quick.textContent = project.title;
          nav.appendChild(quick);

          const article = document.createElement("article");
          article.id = project.id;
          article.className = "project";
          article.dataset.layer = project.layer;

          const projectHeader = document.createElement("header");
          const title = document.createElement("h2");
          title.textContent = project.title;
          const summary = document.createElement("p");
          summary.textContent = project.summary;
          const links = document.createElement("div");
          links.className = "links";
          const readme = document.createElement("a");
          readme.href = project.readme;
          readme.textContent = "Open README";
          links.appendChild(readme);
          projectHeader.append(title, summary, links);

          const diagram = document.createElement("div");
          diagram.className = "diagram";
          diagram.appendChild(renderDiagram(project));
          article.append(projectHeader, diagram);
          mapsRoot.appendChild(article);
        }

        if (!visible.length) {
          const empty = document.createElement("p");
          empty.className = "empty";
          empty.textContent = "No subproject maps match the current filter.";
          mapsRoot.appendChild(empty);
        }
        status.textContent = `Showing ${visible.length} of ${maps.length} subproject maps for ${layerLabels.get(filter)}.`;
        if (options.updateUrl !== false) {
          updateUrl(filter, query);
        }
        scrollToProjectFromHash();
      }

      for (const button of buttons) {
        button.addEventListener("click", () => render({ filter: button.dataset.filter || "all" }));
      }
      search.addEventListener("input", () => render({ filter: filterFromHash() }));
      search.value = new URL(location.href).searchParams.get("q") || "";
      render({ updateUrl: false });
    </script>
  </body>
</html>
