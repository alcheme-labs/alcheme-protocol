name: Security Audit

on:
  schedule:
    # 每天 UTC 00:00 运行
    - cron: '0 0 * * *'
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ==================== Rust 依赖审计 ====================
  cargo-audit:
    name: Cargo Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: services/indexer-core
        run: cargo audit --deny warnings

      - name: Upload audit report
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cargo-audit-report
          path: services/indexer-core/Cargo.lock

  # ==================== Node.js 依赖审计 ====================
  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: query-api
            working_directory: services/query-api
          - service: sdk
            working_directory: sdk
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        working-directory: ${{ matrix.working_directory }}
        run: |
          npm audit --audit-level=moderate
          npm audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v3
        with:
          name: npm-audit-${{ matrix.service }}
          path: ${{ matrix.working_directory }}/audit-report.json

  license-audit:
    name: Node License Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit dependency license risk
        run: node scripts/audit-node-license-risk.mjs --json license-audit-report.json --fail-on-strong --fail-on-unapproved-watchlist

      - name: Upload license audit report
        uses: actions/upload-artifact@v3
        with:
          name: license-audit-report
          path: license-audit-report.json

  # ==================== 代码安全扫描 ====================
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    strategy:
      matrix:
        language: [javascript, typescript]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  # ==================== Secrets 扫描 ====================
  secret-scan:
    name: Scan for Leaked Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ==================== Docker 镜像扫描 ====================
  container-scan:
    name: Container Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    strategy:
      matrix:
        service: [indexer-core, query-api]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }}:test -f services/${{ matrix.service }}/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ==================== 智能合约安全扫描 ====================
  anchor-security:
    name: Smart Contract Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/solana-foundation/anchor --tag v0.31.1 anchor-cli --locked

      - name: Build contracts
        run: anchor build

      - name: Run Solana security audit script
        run: |
          bash scripts/run-solana-security-audit.sh

  # ==================== 安全报告汇总 ====================
  security-summary:
    name: Security Audit Summary
    runs-on: ubuntu-latest
    needs: [cargo-audit, npm-audit, license-audit, codeql-analysis, secret-scan, anchor-security]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "# Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cargo Audit | ${{ needs.cargo-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NPM Audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Audit | ${{ needs.license-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Security | ${{ needs.anchor-security.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Send notification if failures
        if: contains(needs.*.result, 'failure')
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: Security audit found issues! Check GitHub Actions for details.
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
