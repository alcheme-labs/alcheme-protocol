version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: alcheme-postgres
    environment:
      POSTGRES_DB: alcheme_indexer
      POSTGRES_USER: alcheme
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alcheme_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alcheme"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: alcheme-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # LiveKit 本地语音服务
  livekit:
    image: livekit/livekit-server:latest
    container_name: alcheme-livekit
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    restart: unless-stopped

  # Rust 索引器核心
  indexer-core:
    build:
      context: .
      dockerfile: services/indexer-core/Dockerfile
    container_name: alcheme-indexer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      INDEXER_EVENT_SOURCE: ${INDEXER_EVENT_SOURCE:-yellowstone}
      RPC_ENDPOINT: ${RPC_ENDPOINT:-}
      YELLOWSTONE_ENDPOINT: ${YELLOWSTONE_ENDPOINT:-}
      YELLOWSTONE_TOKEN: ${YELLOWSTONE_TOKEN:-}
      EVENT_EMITTER_PROGRAM_ID: ${EVENT_EMITTER_PROGRAM_ID:-}
      DATABASE_URL: postgresql://alcheme:${DB_PASSWORD:-alcheme_dev_password}@postgres:5432/alcheme_indexer
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${RUST_LOG:-info}
    restart: unless-stopped

  # TypeScript Query API
  query-api:
    build:
      context: .
      dockerfile: services/query-api/Dockerfile
    container_name: alcheme-query-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://alcheme:${DB_PASSWORD:-alcheme_dev_password}@postgres:5432/alcheme_indexer
      REDIS_URL: redis://redis:6379
      PORT: 4000
      NODE_ENV: development
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-${RPC_ENDPOINT:-}}
      CONTENT_PROGRAM_ID: ${CONTENT_PROGRAM_ID:-${NEXT_PUBLIC_CONTENT_PROGRAM_ID:-}}
      AI_MODE: ${AI_MODE:-builtin}
      AI_BUILTIN_TEXT_API: ${AI_BUILTIN_TEXT_API:-chat_completions}
      NEW_API_URL: ${NEW_API_URL:-}
      NEW_API_KEY: ${NEW_API_KEY:-}
      NEW_API_TIMEOUT_MS: ${NEW_API_TIMEOUT_MS:-15000}
      AI_GATEWAY_TIMEOUT_MS: ${AI_GATEWAY_TIMEOUT_MS:-15000}
      AI_EXTERNAL_URL: ${AI_EXTERNAL_URL:-}
      AI_EXTERNAL_TIMEOUT_MS: ${AI_EXTERNAL_TIMEOUT_MS:-15000}
      AI_EXTERNAL_PRIVATE_CONTENT_MODE: ${AI_EXTERNAL_PRIVATE_CONTENT_MODE:-deny}
      SCORING_MODEL: ${SCORING_MODEL:-qwen2.5:7b}
      GHOST_DRAFT_MODEL: ${GHOST_DRAFT_MODEL:-llama3.1:8b}
      DISCUSSION_INITIAL_DRAFT_MODEL: ${DISCUSSION_INITIAL_DRAFT_MODEL:-}
      DISCUSSION_SUMMARY_MODEL: ${DISCUSSION_SUMMARY_MODEL:-qwen2.5:7b}
      DISCUSSION_TRIGGER_MODEL: ${DISCUSSION_TRIGGER_MODEL:-qwen2.5:7b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      DRAFT_LIFECYCLE_ANCHOR_LOOKUP_ATTEMPTS: ${DRAFT_LIFECYCLE_ANCHOR_LOOKUP_ATTEMPTS:-30}
      DRAFT_LIFECYCLE_ANCHOR_LOOKUP_DELAY_MS: ${DRAFT_LIFECYCLE_ANCHOR_LOOKUP_DELAY_MS:-1000}
      DRAFT_LIFECYCLE_ANCHOR_RPC_TIMEOUT_MS: ${DRAFT_LIFECYCLE_ANCHOR_RPC_TIMEOUT_MS:-5000}
      DRAFT_ANCHOR_RPC_URL: ${DRAFT_ANCHOR_RPC_URL:-${SOLANA_RPC_URL:-${RPC_ENDPOINT:-}}}
      COLLAB_EDIT_ANCHOR_RPC_URL: ${COLLAB_EDIT_ANCHOR_RPC_URL:-${DRAFT_ANCHOR_RPC_URL:-${SOLANA_RPC_URL:-${RPC_ENDPOINT:-}}}}
      DRAFT_ANCHOR_ENABLED: ${DRAFT_ANCHOR_ENABLED:-}
      DRAFT_ANCHOR_WRITER_ENABLED: ${DRAFT_ANCHOR_WRITER_ENABLED:-}
      COLLAB_EDIT_ANCHOR_ENABLED: ${COLLAB_EDIT_ANCHOR_ENABLED:-}
      COLLAB_EDIT_ANCHOR_WRITER_ENABLED: ${COLLAB_EDIT_ANCHOR_WRITER_ENABLED:-}
      ANCHOR_SIGNER_MODE: ${ANCHOR_SIGNER_MODE:-}
      ANCHOR_SIGNER_URL: ${ANCHOR_SIGNER_URL:-}
      ANCHOR_SIGNER_AUTH_TOKEN: ${ANCHOR_SIGNER_AUTH_TOKEN:-}
      ANCHOR_SIGNER_TIMEOUT_MS: ${ANCHOR_SIGNER_TIMEOUT_MS:-10000}
      CRYSTAL_MINT_RPC_URL: ${CRYSTAL_MINT_RPC_URL:-}
      CRYSTAL_MINT_AUTHORITY_SECRET: ${CRYSTAL_MINT_AUTHORITY_SECRET:-}
      CRYSTAL_MASTER_OWNER_PUBKEY: ${CRYSTAL_MASTER_OWNER_PUBKEY:-}
      CRYSTAL_METADATA_BASE_URL: ${CRYSTAL_METADATA_BASE_URL:-}
      # disabled keeps query-api usable without LiveKit; set livekit for voice tests.
      VOICE_PROVIDER: ${VOICE_PROVIDER:-disabled}
      # Browser/client WebSocket URL. query-api uses LIVEKIT_SERVER_URL internally.
      VOICE_PUBLIC_URL: ${VOICE_PUBLIC_URL:-ws://localhost:7880}
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-http://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      VOICE_REQUIRE_PROVIDER_HEALTH: ${VOICE_REQUIRE_PROVIDER_HEALTH:-false}
      VOICE_PROVIDER_HEALTH_TIMEOUT_MS: ${VOICE_PROVIDER_HEALTH_TIMEOUT_MS:-1500}
    restart: unless-stopped
    volumes:
      - ./services/query-api:/app
      - /app/node_modules

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: alcheme-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: alcheme-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
